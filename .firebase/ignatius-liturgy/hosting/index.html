<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanctus Liturgy Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
              display: ['Cinzel', 'serif'],
            },
            colors: {
              church: {
                50: '#fcfbf9',
                100: '#f6f3ef',
                200: '#ede6dd',
                300: '#e0d1c1',
                400: '#d1bda3',
                500: '#ac8e68',
                600: '#9d7d59',
                700: '#836649',
                800: '#6d5540',
                900: '#594636',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Ensure items don't split awkwardly across pages */
      .avoid-break {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      @media print {
        @page {
          margin: 0;
          size: auto;
        }

        /* RESET ALL CONTAINERS */
        html, body, #root, #app-container {
          height: auto !important;
          min-height: 0 !important;
          width: 100% !important;
          overflow: visible !important;
          background: white !important;
          position: static !important;
          display: block !important;
        }

        /* HIDE EVERYTHING BY DEFAULT */
        body * {
          visibility: hidden;
        }

        /* SHOW ONLY THE PRINTABLE CONTENT */
        /* We target the class added in PreviewPanel and all its children */
        .printable-content, 
        .printable-content * {
          visibility: visible;
        }

        /* POSITION THE CONTENT */
        .printable-content {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
          transform: none !important; /* Remove zoom scaling */
        }

        /* Explicitly hide UI elements if they persist */
        .no-print {
          display: none !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
  }
}
</script>
</head>
  <body class="bg-gray-100 text-gray-900 font-sans antialiased overflow-hidden">
    <div id="root"></div>
  </body>
</html>
